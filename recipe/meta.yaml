{% set name = "sasmodels" %}
{% set version = "1.0.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 800eb10e27d9e2b4d344f51e169d0ed2bc3f730883cdf1e9f925c542afafd588

build:
  number: 0
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vvv '
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-build
    - hatch-requirements-txt
    - hatch-sphinx
    - hatch-vcs
    - numpy
    - scipy
  run:
    - python >={{ python_min }}
    - bumps
    - numpy
    - pyopencl
    - scipy

test:
  requires:
    - python {{ python_min }}
  imports:
    - sasmodels
    - sasmodels.custom
    - sasmodels.models

about:
  home: http://www.sasview.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Package for calculation of small angle scattering models using OpenCL
  dev_url: https://github.com/SasView/sasmodels

extra:
  recipe-maintainers:
    - tschoonj
    - mrakitin
